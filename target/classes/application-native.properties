# ========================================
# Application Configuration
# ========================================
quarkus.application.name=example-quarkus-opentelemetry
quarkus.application.version=1.0.0
# ========================================
# HTTP & Security Configuration
# ========================================
quarkus.http.port=8080
quarkus.http.host=0.0.0.0
# Public endpoints (no authentication required)
quarkus.http.auth.permission.public.enabled=true
quarkus.http.auth.permission.public.paths=/auth/login,/auth/register,/auth/refresh
quarkus.http.auth.permission.public.policy=permit
# Authenticated endpoints
quarkus.http.auth.permission.authenticated.enabled=true
quarkus.http.auth.permission.authenticated.paths=/api/*,/users/*,/roles/*
quarkus.http.auth.permission.authenticated.policy=authenticated
quarkus.http.auth.permission.auth-me.enabled=true
quarkus.http.auth.permission.auth-me.paths=/auth/me
quarkus.http.auth.permission.auth-me.policy=authenticated
# ========================================
# CORS Configuration
# ========================================
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
# ========================================
# Database Configuration
# ========================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DATABASE_USERNAME:postgres}
quarkus.datasource.password=${DATABASE_PASSWORD:password}
quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://app-db:5432/example_quarkus}
# Hibernate ORM
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.sql-load-script=import.sql
quarkus.hibernate-orm.log.sql=false
# Flyway
quarkus.flyway.enabled=true
quarkus.flyway.migrate-at-start=true
# ========================================
# JWT Configuration
# ========================================
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://example-quarkus-opentelemetry.com
mp.jwt.token.header=Authorization
# Token expiration
app.jwtExpirationMs=604800000
app.jwtRefreshExpirationMs=86400000
# ========================================
# OpenTelemetry Configuration
# ========================================
quarkus.otel.sdk.disabled=false
quarkus.otel.enabled=true
quarkus.otel.traces.enabled=true
quarkus.otel.metrics.enabled=true
quarkus.otel.logs.enabled=true
# Service info
quarkus.otel.service.name=${QUARKUS_OTEL_SERVICE_NAME:example-quarkus-opentelemetry}
quarkus.otel.resource.attributes=service.name=${quarkus.application.name},service.version=${quarkus.application.version},deployment.environment=${QUARKUS_PROFILE:production}
# OTLP Exporter
quarkus.otel.exporter.otlp.endpoint=${QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4317}
quarkus.otel.exporter.otlp.protocol=grpc
quarkus.otel.exporter.otlp.traces.timeout=10s
quarkus.otel.exporter.otlp.metrics.timeout=10s
quarkus.otel.exporter.otlp.logs.timeout=10s
# Instrumentation
quarkus.otel.instrument.rest=true
quarkus.otel.instrument.messaging=true
quarkus.otel.instrument.grpc=true
quarkus.otel.instrument.jvm-metrics=true
# Logs handler
quarkus.otel.logs.handler.enabled=true
# ========================================
# Logging Configuration
# ========================================
quarkus.log.level=INFO
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p traceId=%X{traceId}, spanId=%X{spanId} [%c{2.}] (%t) %s%e%n
# Category levels
quarkus.log.category."com.sanedge".level=DEBUG
quarkus.log.category."io.quarkus.otel".level=INFO
quarkus.log.category."io.opentelemetry".level=INFO
quarkus.log.category."io.smallrye.jwt".level=INFO
quarkus.log.category."io.quarkus.security".level=INFO
# ========================================
# Health & Metrics
# ========================================
quarkus.smallrye-health.root-path=/health
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics
# ========================================
# Database Seeder
# ========================================
app.db.seeder.enabled=true
# ========================================
# Native Build Configuration
# ========================================
quarkus.native.resources.includes=**/*.pem,**/*.crt,**/*.key,import.sql,META-INF/**
quarkus.native.enable-http-url-handler=true
quarkus.native.enable-https-url-handler=true
quarkus.native.enable-all-security-services=true
quarkus.native.enable-vm-inspection=false
quarkus.native.enable-jni=true
# Additional build arguments for native compilation
quarkus.native.additional-build-args=\
  -H:+ReportExceptionStackTraces,\
  -H:+AddAllCharsets,\
  -H:EnableURLProtocols=http\\,https,\
  --initialize-at-build-time=org.postgresql.Driver,\
  --initialize-at-build-time=org.postgresql.util.SharedTimer,\
  --initialize-at-run-time=io.netty.handler.ssl.ReferenceCountedOpenSslEngine,\
  --initialize-at-run-time=io.netty.handler.ssl.ReferenceCountedOpenSslContext,\
  --initialize-at-run-time=io.netty.handler.ssl.JdkNpnApplicationProtocolNegotiator,\
  --initialize-at-run-time=io.netty.handler.ssl.ConscryptAlpnSslEngine,\
  --initialize-at-run-time=io.netty.handler.codec.http2.Http2CodecUtil,\
  --initialize-at-run-time=io.netty.handler.codec.http2.DefaultHttp2FrameWriter,\
  --initialize-at-run-time=io.netty.handler.ssl.BouncyCastleAlpnSslUtils,\
  --initialize-at-run-time=io.netty.internal.tcnative.SSL,\
  --initialize-at-run-time=io.netty.handler.ssl.OpenSsl,\
  --initialize-at-run-time=io.netty.handler.ssl.OpenSslContext,\
  --initialize-at-run-time=io.netty.handler.ssl.util.ThreadLocalInsecureRandom,\
  --report-unsupported-elements-at-runtime,\
  --allow-incomplete-classpath,\
  -J-Xmx8g
# Reflection configuration
quarkus.native.auto-service-loader-registration=true
# ========================================
# Profile: Native
# ========================================
%native.quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://app-db:5432/example_quarkus}
%native.quarkus.otel.exporter.otlp.endpoint=${QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4317}
%native.quarkus.log.level=INFO
# ========================================
# Profile: Docker
# ========================================
%docker.quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://postgres:5432/example_quarkus}
%docker.quarkus.otel.exporter.otlp.endpoint=${QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4317}
# ========================================
# Profile: Development
# ========================================
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/example_quarkus
%dev.quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
%dev.quarkus.log.level=DEBUG
%dev.quarkus.hibernate-orm.log.sql=true