quarkus.http.auth.permission.public.enabled=true
quarkus.http.auth.permission.public.paths=/auth/login,/auth/register,/auth/refresh
quarkus.http.auth.permission.public.policy=permit
quarkus.application.name=example-quarkus-opentelemetry
quarkus.application.version=3.30.4
quarkus.http.auth.permission.authenticated.enabled=true
quarkus.http.auth.permission.authenticated.paths=/api/*,/users/*,/roles/*
quarkus.http.auth.permission.authenticated.policy=authenticated
quarkus.http.auth.permission.auth-me.enabled=true
quarkus.http.auth.permission.auth-me.paths=/auth/me
quarkus.http.auth.permission.auth-me.policy=authenticated
# Database configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=password
quarkus.datasource.jdbc.url=jdbc:postgresql://app-db:5432/example_quarkus
# Hibernate ORM configuration
quarkus.hibernate-orm.sql-load-script=import.sql
# Flyway configuration
quarkus.flyway.enabled=true
quarkus.flyway.migrate-at-start=true
# ========================================
# JWT Configuration - SIGNED TOKENS ONLY
# ========================================
# Private key untuk SIGNING token (saat generate)
smallrye.jwt.sign.key.location=privateKey.pem
# Public key untuk VERIFIKASI token (saat validate)
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://example-quarkus-opentelemetry.com
# Token header
mp.jwt.token.header=Authorization
# HAPUS BARIS INI (ini yang bikin masalah):
# smallrye.jwt.encrypt.key.location=publicKey.pem
# mp.jwt.decrypt.key.location=privateKey.pem
# Token expiration
app.jwtExpirationMs=604800000
app.jwtRefreshExpirationMs=86400000
# CORS Configuration
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
# ========================================
# OpenTelemetry (Quarkus-native)
# ========================================
quarkus.otel.enabled=true
quarkus.otel.traces.enabled=true
quarkus.otel.exporter.otlp.traces.timeout=10s
quarkus.otel.instrument.jvm-metrics=true
quarkus.otel.metrics.enabled=true
quarkus.otel.exporter.otlp.metrics.timeout=10s
quarkus.otel.logs.enabled=true
quarkus.otel.exporter.otlp.logs.timeout=10s
quarkus.otel.logs.handler.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://otel-collector:4317
quarkus.otel.exporter.otlp.protocol=grpc
quarkus.otel.resource.attributes=service.name=${quarkus.application.name},service.version=1.0.0,deployment.environment=production
quarkus.otel.instrument.rest=true
quarkus.otel.instrument.messaging=true
quarkus.otel.instrument.grpc=true
otel.jfr.enabled=true
# Logging Configuration
quarkus.log.console.format=%d{HH:mm:ss} %-5p traceId=%X{traceId}, spanId=%X{spanId} [%c{2.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."io.quarkus.otel".level=DEBUG
quarkus.log.category."io.smallrye.jwt".level=DEBUG
quarkus.log.category."io.quarkus.security".level=DEBUG
# Database seeder
app.db.seeder.enabled=true